// ── Firebase REST API (no SDK needed) ────────────────
async function fbRead(){
  const r=await fetch(FIREBASE_URL+DB_PATH);
  if(!r.ok) throw new Error('Read failed: '+r.status);
  return await r.json();
}
async function fbWrite(data){
  const r=await fetch(FIREBASE_URL+DB_PATH,{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data),
  });
  if(!r.ok) throw new Error('Write failed: '+r.status);
}

};

let lastHash='';
let pollTimer=null;

function st(p){Object.assign(S,p);render();}
function showToast(msg){if(S._tt)clearTimeout(S._tt);const t=setTimeout(()=>st({toast:null,_tt:null}),2600);st({toast:msg,_tt:t});}

// ── Save / Load ───────────────────────────────────────
async function saveData(zones,deleted){
  deleted=deleted??S.deleted;
  S.zones=zones;S.deleted=deleted;S.sync='saving';render();
  LS.set(LOCAL_KEY,{zones,_deleted:deleted});
  try{
    await fbWrite({zones,_deleted:deleted});
    lastHash=JSON.stringify(zones);
    S.sync='synced';S.savedAt=new Date();
  }catch(e){
    console.warn('Firebase write failed:',e);
    S.sync='offline';
  }
  render();
}

async function pollCloud(){
  try{
    const remote=await fbRead();
    if(!remote?.zones)return;
    const hash=JSON.stringify(remote.zones);
    if(hash===lastHash)return;
    lastHash=hash;
    S.zones=remote.zones;
    S.deleted=remote._deleted||[];
    LS.set(LOCAL_KEY,{zones:S.zones,_deleted:S.deleted});
    S.sync='synced';S.savedAt=new Date();
    render();
  }catch{}
}

function startPoll(){if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(pollCloud,POLL_MS);}

// ── Actions ───────────────────────────────────────────
function toggleDone(zi,ii){const z=cp(S.zones);z[zi].items[ii].done=!z[zi].items[ii].done;z[zi].items[ii].updatedAt=Date.now();saveData(z);}
function cyclePri(zi,ii,e){e.stopPropagation();const z=cp(S.zones);const cur=z[zi].items[ii].priority;const nxt=PRI[(PRI.indexOf(cur)+1)%PRI.length];z[zi].items[ii].priority=nxt;z[zi].items[ii].updatedAt=Date.now();saveData(z);showToast('Marked as '+PCFG[nxt].label+' ✓');}
function doSaveItem({name,source,priority,tzi,czi,ii}){const z=cp(S.zones);const item={...z[czi].items[ii],name,source,priority,updatedAt:Date.now(),id:z[czi].items[ii].id||uid()};z[czi].items.splice(ii,1);z[tzi].items.push(item);saveData(z);showToast(tzi!==czi?`Moved ✓`:'Updated ✓');}
function doDelete(zi,ii){const z=cp(S.zones);const did=z[zi].items[ii].id;z[zi].items.splice(ii,1);const del=did?[...new Set([...S.deleted,did])]:S.deleted;saveData(z,del);showToast('Removed ✓');}
function doAdd({name,source,priority,zi}){const z=cp(S.zones);z[parseInt(zi)].items.push({name,source,priority,done:false,id:uid(),updatedAt:Date.now()});saveData(z);showToast('Added ✓');}
function doAddZone(name){if(!name.trim())return;const z=cp(S.zones);z.push({zone:name.trim(),items:[]});saveData(z);showToast('Zone added ✓');}
function saveName(n){if(!n.trim())return;LS.set(NAME_KEY,n.trim());st({myName:n.trim()});showToast(`Hi ${n.trim()}! 👋`);}

function openEdit(zi,ii){const item=S.zones[zi].items[ii];editSt={zi,ii,name:item.name,pri:item.priority,src:item.source,tzi:zi,del:false};drawerMode='edit';render();}
function openAdd(zi){addSt={zi,name:'',pri:'high',src:'nl'};drawerMode='add';render();}
function closeDrawer(){drawerMode=null;render();}
function setEPri(p){editSt.pri=p;PRI.forEach(x=>{const el=document.getElementById('ep_'+x);if(!el)return;const cfg=PCFG[x],a=x===p;el.style.background=a?cfg.bg:'#F9FAFB';el.style.color=a?cfg.color:'#9CA3AF';el.style.fontWeight=a?700:400;});}
function setESrc(v){editSt.src=v;Object.keys(SCFG).forEach(x=>{const el=document.getElementById('es_'+x);if(!el)return;const a=x===v;el.style.borderColor=a?'#003DA5':'#E5E7EB';el.style.background=a?'#EFF6FF':'#F9FAFB';el.style.color=a?'#003DA5':'#6B7280';el.style.fontWeight=a?700:400;});}
function commitEdit(){const name=(document.getElementById('eName')||{}).value?.trim()||editSt.name;const tzi=parseInt((document.getElementById('eTzi')||{}).value??editSt.tzi);if(!name)return;doSaveItem({name,source:editSt.src,priority:editSt.pri,tzi,czi:editSt.zi,ii:editSt.ii});drawerMode=null;}
function setAPri(p){addSt.pri=p;PRI.forEach(x=>{const el=document.getElementById('ap_'+x);if(!el)return;const cfg=PCFG[x],a=x===p;el.style.background=a?cfg.bg:'#F9FAFB';el.style.color=a?cfg.color:'#9CA3AF';el.style.fontWeight=a?700:400;});}
function setASrc(v){addSt.src=v;Object.keys(SCFG).forEach(x=>{const el=document.getElementById('as_'+x);if(!el)return;const a=x===v;el.style.borderColor=a?'#003DA5':'#E5E7EB';el.style.background=a?'#EFF6FF':'#F9FAFB';el.style.color=a?'#003DA5':'#6B7280';el.style.fontWeight=a?700:400;});}
function commitAdd(){const name=(document.getElementById('aName')||{}).value?.trim()||addSt.name;const zi=parseInt((document.getElementById('aZi')||{}).value??addSt.zi);if(!name){document.getElementById('aName')?.focus();return;}doAdd({name,source:addSt.src,priority:addSt.pri,zi});drawerMode=null;}

function render(){
  if(!S.zones){document.getElementById('root').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem"><div style="font-size:2.5rem">🌷</div><div class="spin" style="width:30px;height:30px;border:3px solid #E5E0D8;border-top-color:#E8650A;border-radius:50%"></div><div style="color:#6B7280;font-size:.85rem;font-family:DM Sans,sans-serif">Loading Ons Huis…</div></div>`;return;}
  renderApp();
}

// ── Boot ──────────────────────────────────────────────
async function boot(){
  render();
  try{
    const remote=await fbRead();
    if(remote?.zones?.length){
      S.zones=remote.zones;
      S.deleted=remote._deleted||[];
      LS.set(LOCAL_KEY,{zones:S.zones,_deleted:S.deleted});
      lastHash=JSON.stringify(S.zones);
      S.sync='synced';S.savedAt=new Date();
    }else{
      // Firebase empty — push default data
      const local=LS.get(LOCAL_KEY);
      S.zones=local?.zones||makeDefault();
      S.deleted=local?._deleted||[];
      await fbWrite({zones:S.zones,_deleted:S.deleted});
      lastHash=JSON.stringify(S.zones);
      S.sync='synced';S.savedAt=new Date();
    }
  }catch(e){
    console.warn('Firebase load failed, using local:',e);
    const local=LS.get(LOCAL_KEY);
    S.zones=local?.zones||makeDefault();
    S.deleted=local?._deleted||[];
    S.sync='offline';
  }
  render();
  startPoll();
}

boot();
</script>
